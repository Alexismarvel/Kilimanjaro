<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — Kilimanjaro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="products.css">
</head>
<body>

    <!-- ============ NAVBAR ============ -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-container">
                <div class="conveyor-belt">
                    <div class="belt-track"></div>
                    <div class="belt-rollers">
                        <div class="roller"></div>
                        <div class="roller"></div>
                        <div class="roller"></div>
                        <div class="roller"></div>
                    </div>
                </div>
                <div class="cart-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="m1 1 4 0 2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </div>
                <span class="brand-name">Kilimanjaro</span>
            </a>

            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Dashboard</a></li>
                <li><a href="products.html" class="nav-link active">Products</a></li>
                <li><a href="#" class="nav-link">Orders</a></li>
                <li><a href="#" class="nav-link">Customers</a></li>
                <li><a href="#" class="nav-link">Analytics</a></li>
            </ul>

            <div class="nav-right">
                <div class="nav-search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" placeholder="Search..." id="navSearchInput">
                </div>
                <div class="nav-icons">
                    <button class="nav-icon-btn" id="notifBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span class="notif-dot"></span>
                    </button>
                    <button class="nav-icon-btn cart-nav-btn" id="cartToggle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="m1 1 4 0 2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span class="cart-count" id="cartCountNav">0</span>
                    </button>
                    <div class="user-avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                </div>
                <button class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ============ HERO SECTION ============ -->
    <section class="shop-hero">
        <div class="shop-hero-glow glow-hero-left"></div>
        <div class="shop-hero-glow glow-hero-right"></div>
        <div class="shop-hero-content">
            <h1 class="shop-hero-title">Shop Our Collection</h1>
            <p class="shop-hero-subtitle">Discover quality products across all categories</p>
        </div>
    </section>

    <!-- ============ MAIN SHOP CONTENT ============ -->
    <main class="shop-container">

        <!-- Category Filter Bar -->
        <div class="filter-bar">
            <button class="filter-btn active" data-category="all">All Products</button>
            <button class="filter-btn" data-category="accessories">Accessories</button>
            <button class="filter-btn" data-category="food">Food & Groceries</button>
            <button class="filter-btn" data-category="clothing">Clothing</button>
            <button class="filter-btn" data-category="phones">Phones & Tech</button>
            <button class="filter-btn" data-category="utensils">Utensils</button>
            <button class="filter-btn" data-category="party">Party & Instruments</button>
            <button class="filter-btn" data-category="home">Home & Living</button>
            <button class="filter-btn" data-category="sports">Sports & Fitness</button>
        </div>

        <!-- Results Bar -->
        <div class="results-bar">
            <p class="results-count"><span id="productCount">0</span> products found</p>
            <div class="sort-control">
                <label for="sortSelect">Sort by:</label>
                <select id="sortSelect">
                    <option value="featured">Featured</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="name-az">Name: A-Z</option>
                    <option value="rating">Top Rated</option>
                </select>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="productGrid">
            <!-- Products injected by JS -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <p>No products found matching your search.</p>
            <button class="action-btn btn-primary" id="clearSearchBtn">Clear Filters</button>
        </div>

    </main>

    <!-- ============ CART SIDEBAR ============ -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-sidebar-header">
            <h3>Your Cart</h3>
            <button class="cart-close" id="cartClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty" id="cartEmpty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="m1 1 4 0 2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <p>Your cart is empty</p>
            </div>
        </div>
        <div class="cart-sidebar-footer" id="cartFooter" style="display:none;">
            <div class="cart-total-row">
                <span>Subtotal</span>
                <span id="cartSubtotal">$0.00</span>
            </div>
            <div class="cart-total-row cart-total-final">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="action-btn btn-primary btn-checkout">Proceed to Checkout</button>
            <button class="action-btn btn-outline btn-continue" id="continueShopping">Continue Shopping</button>
        </div>
    </aside>

    <!-- ============ TOAST ============ -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
    <script src="products.js"></script>
</body>
</html>
